worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 小程序 API -> 8081
    upstream miniprogram_api {
        server 127.0.0.1:8081;
    }

    # 机器人 API -> 8080
    upstream bot_api {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name www.rabbits.ink;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name www.rabbits.ink;

        ssl_certificate      C:/nginx/ssl/www.rabbits.ink/full_chain.pem;
        ssl_certificate_key  C:/nginx/ssl/www.rabbits.ink/private.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 20m;

        location /miniprogram-api/ {
            rewrite ^/miniprogram-api/(.*)$ /$1 break;
            proxy_pass http://miniprogram_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /bot-api/ {
            rewrite ^/bot-api/(.*)$ /$1 break;
            proxy_pass http://bot_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
